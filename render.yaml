# render.yaml — Render.com deployment config for DetectiveOS backend
services:
  - type: web
    name: detectiveos-api
    env: python
    region: oregon
    plan: free
    pythonVersion: "3.11.9"

    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: detectiveos-db
          property: connectionString

      - key: ANTHROPIC_API_KEY
        sync: false

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_ALGORITHM
        value: HS256

      - key: JWT_EXPIRE_MINUTES
        value: "10080"

      - key: ENVIRONMENT
        value: production

      - key: CORS_ORIGINS
        value: https://your-app.vercel.app

databases:
  - name: mystera-db
    databaseName: mystera
    user: detective
    plan: free
